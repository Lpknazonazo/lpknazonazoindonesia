<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Jepang - Prime Tekipaki Raya</title>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
    font-family: 'Segoe UI';
    background:#f4f6f9;
    margin:0;
}

.container {
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
}

h2,h3 {
    color:#1e3a8a;
}

.form-group {
    margin-bottom:15px;
}

.form-row {
    display:flex;
    gap:10px;
}

input,select {
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

button {
    padding:10px 20px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.btn {
    background:#1e3a8a;
    color:white;
}

.btn-add {
    background:#d4af37;
}

.item {
    border:1px solid #ddd;
    padding:10px;
    border-radius:10px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<div class="container">
<h2>Form Pendaftaran Jepang</h2>

<form id="form">

<!-- WAWANCARA -->
<div class="form-row">
    <div class="form-group">
        <label>Jumlah Wawancara</label>
        <input type="number" id="wawancara">
    </div>
    <div class="form-group">
        <label>Pernah ke Jepang</label>
        <select id="jepang">
            <option value="Belum">Belum</option>
            <option value="Pernah">Pernah</option>
        </select>
    </div>
</div>

<!-- NAMA -->
<div class="form-group">
    <label>Nama</label>
    <input type="text" id="nama" required>
</div>

<!-- ================= PENDIDIKAN ================= -->
<h3>Pendidikan</h3>
<div id="pendidikan">
    <div class="item">
        <div class="form-row">
            <input type="month" class="dari">
            <input type="month" class="sampai">
        </div>
        <input type="text" placeholder="Nama Sekolah" class="sekolah">
        <input type="text" placeholder="Jenjang" class="jenjang">
        <input type="text" placeholder="Jurusan" class="jurusan">
    </div>
</div>

<button type="button" class="btn-add" onclick="tambahPendidikan()">+ Tambah Pendidikan</button>

<!-- ================= KELUARGA ================= -->
<h3>Keluarga</h3>

<div id="keluarga">

<div class="item">
<b>Ayah</b>
<input type="hidden" value="Ayah" class="hubungan">
<input type="text" placeholder="Nama" class="namaK">
<input type="number" placeholder="Umur" class="umur">
<input type="text" placeholder="Pekerjaan" class="kerja">
<input type="number" placeholder="Penghasilan" class="gaji">
</div>

<div class="item">
<b>Ibu</b>
<input type="hidden" value="Ibu" class="hubungan">
<input type="text" placeholder="Nama" class="namaK">
<input type="number" placeholder="Umur" class="umur">
<input type="text" placeholder="Pekerjaan" class="kerja">
<input type="number" placeholder="Penghasilan" class="gaji">
</div>

</div>

<button type="button" class="btn-add" onclick="tambahKeluarga()">+ Tambah Kakak/Adik</button>

<!-- FOTO -->
<div class="form-group">
<label>Upload Foto</label>
<input type="file" id="foto">
</div>

<br>

<button type="submit" class="btn">Download PDF</button>

</form>
</div>

<script>

// TAMBAH PENDIDIKAN
function tambahPendidikan(){
    let div = document.createElement("div");
    div.className="item";
    div.innerHTML = `
    <div class="form-row">
        <input type="month" class="dari">
        <input type="month" class="sampai">
    </div>
    <input type="text" placeholder="Nama Sekolah" class="sekolah">
    <input type="text" placeholder="Jenjang" class="jenjang">
    <input type="text" placeholder="Jurusan" class="jurusan">
    `;
    document.getElementById("pendidikan").appendChild(div);
}

// TAMBAH KELUARGA
function tambahKeluarga(){
    let div = document.createElement("div");
    div.className="item";
    div.innerHTML = `
    <select class="hubungan">
        <option>Kakak</option>
        <option>Adik</option>
    </select>
    <input type="text" placeholder="Nama" class="namaK">
    <input type="number" placeholder="Umur" class="umur">
    <input type="text" placeholder="Pekerjaan" class="kerja">
    <input type="number" placeholder="Penghasilan" class="gaji">
    `;
    document.getElementById("keluarga").appendChild(div);
}

// SUBMIT FORM
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let y = 20;

    doc.text("DATA PENDAFTAR", 20, y); y+=10;

    doc.text("Nama: " + document.getElementById("nama").value, 20, y); y+=10;
    doc.text("Wawancara: " + document.getElementById("wawancara").value, 20, y); y+=10;
    doc.text("Ke Jepang: " + document.getElementById("jepang").value, 20, y); y+=10;

    // PENDIDIKAN
    doc.text("Pendidikan:", 20, y); y+=10;
    document.querySelectorAll("#pendidikan .item").forEach(p=>{
        doc.text(
            (p.querySelector(".sekolah").value || "-") + 
            " (" + (p.querySelector(".dari").value || "-") + 
            " - " + (p.querySelector(".sampai").value || "-") + ")",
            20, y
        );
        y+=8;
    });

    // KELUARGA
    doc.text("Keluarga:", 20, y); y+=10;
    document.querySelectorAll("#keluarga .item").forEach(k=>{
        doc.text(
            (k.querySelector(".namaK").value || "-") + 
            " - " + (k.querySelector(".hubungan").value || "-"),
            20, y
        );
        y+=8;
    });

    // FOTO
    const file = document.getElementById("foto").files[0];
    if(file){
        const reader = new FileReader();
        reader.onload = function(e){
            doc.addImage(e.target.result, 'JPEG', 140, 20, 40, 40);
            doc.save("data.pdf");
        }
        reader.readAsDataURL(file);
    } else {
        doc.save("data.pdf");
    }

});

</script>

</body>
</html>
