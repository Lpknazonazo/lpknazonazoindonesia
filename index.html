<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Jepang</title>

<link rel="stylesheet" href="style.css">

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {font-family:sans-serif;padding:20px;}
.form-group {margin-bottom:10px;}
.form-row {display:flex;gap:10px;}
input, select {padding:8px;width:100%;}
button {padding:10px;margin-top:10px;}
</style>

</head>
<body>

<h2>Form Pendaftaran Jepang</h2>

<form id="form">

<!-- WAWANCARA -->
<div class="form-row">
    <div class="form-group">
        <label>Jumlah Wawancara</label>
        <input type="number" id="wawancara">
    </div>
    <div class="form-group">
        <label>Pernah ke Jepang</label>
        <select id="jepang">
            <option value="Belum">Belum</option>
            <option value="Pernah">Pernah</option>
        </select>
    </div>
</div>

<!-- NAMA -->
<div class="form-group">
    <label>Nama</label>
    <input type="text" id="nama" required>
</div>

<!-- PENDIDIKAN -->
<h3>Pendidikan</h3>
<div id="pendidikan">
    <div class="item">
        <input type="month" class="dari">
        <input type="month" class="sampai">
        <input type="text" placeholder="Sekolah" class="sekolah">
        <input type="text" placeholder="Jenjang" class="jenjang">
        <input type="text" placeholder="Jurusan" class="jurusan">
    </div>
</div>
<button type="button" onclick="tambahPendidikan()">+ Tambah</button>

<!-- KELUARGA -->
<h3>Keluarga</h3>

<div id="keluarga">

<div class="item">
    <b>Ayah</b>
    <input type="hidden" value="Ayah" class="hubungan">
    <input type="text" placeholder="Nama" class="namaK">
    <input type="number" placeholder="Umur" class="umur">
    <input type="text" placeholder="Pekerjaan" class="kerja">
    <input type="number" placeholder="Gaji" class="gaji">
</div>

<div class="item">
    <b>Ibu</b>
    <input type="hidden" value="Ibu" class="hubungan">
    <input type="text" placeholder="Nama" class="namaK">
    <input type="number" placeholder="Umur" class="umur">
    <input type="text" placeholder="Pekerjaan" class="kerja">
    <input type="number" placeholder="Gaji" class="gaji">
</div>

</div>

<button type="button" onclick="tambahKeluarga()">+ Tambah Saudara</button>

<!-- FOTO -->
<div class="form-group">
    <label>Foto</label>
    <input type="file" id="foto">
</div>

<button type="submit">Download PDF</button>

</form>

<script>

// TAMBAH PENDIDIKAN
function tambahPendidikan(){
    let div = document.createElement("div");
    div.innerHTML = `
    <input type="month" class="dari">
    <input type="month" class="sampai">
    <input type="text" placeholder="Sekolah" class="sekolah">
    <input type="text" placeholder="Jenjang" class="jenjang">
    <input type="text" placeholder="Jurusan" class="jurusan">
    `;
    document.getElementById("pendidikan").appendChild(div);
}

// TAMBAH KELUARGA
function tambahKeluarga(){
    let div = document.createElement("div");
    div.innerHTML = `
    <select class="hubungan">
        <option>Kakak</option>
        <option>Adik</option>
    </select>
    <input type="text" placeholder="Nama" class="namaK">
    <input type="number" placeholder="Umur" class="umur">
    <input type="text" placeholder="Pekerjaan" class="kerja">
    <input type="number" placeholder="Gaji" class="gaji">
    `;
    document.getElementById("keluarga").appendChild(div);
}

// SUBMIT
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    let y = 20;

    doc.text("DATA PENDAFTAR", 20, y); y+=10;

    doc.text("Nama: " + document.getElementById("nama").value, 20, y); y+=10;
    doc.text("Wawancara: " + document.getElementById("wawancara").value, 20, y); y+=10;
    doc.text("Ke Jepang: " + document.getElementById("jepang").value, 20, y); y+=10;

    // PENDIDIKAN
    doc.text("Pendidikan:", 20, y); y+=10;
    document.querySelectorAll("#pendidikan .item").forEach(p=>{
        doc.text(
            p.querySelector(".sekolah").value + " (" + 
            p.querySelector(".dari").value + " - " + 
            p.querySelector(".sampai").value + ")", 20, y
        );
        y+=8;
    });

    // KELUARGA
    doc.text("Keluarga:", 20, y); y+=10;
    document.querySelectorAll("#keluarga .item").forEach(k=>{
        doc.text(
            k.querySelector(".namaK").value + " - " + 
            k.querySelector(".hubungan").value, 20, y
        );
        y+=8;
    });

    doc.save("data.pdf");
});

</script>

</body>
</html>
