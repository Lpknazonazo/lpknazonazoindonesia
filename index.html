<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Tekipaki Raya</title>

    <!-- Font Awesome (WAJIB supaya icon tidak error) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- JS PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- CSS (kalau ada) -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="nav-container">
        <div class="nav-logo">
            <i class="fas fa-graduation-cap"></i>
            Prime Tekipaki Raya
        </div>
        <ul class="nav-menu">
            <li><a href="#home" class="nav-link active">Home</a></li>
            <li><a href="#pendaftaran" class="nav-link">Pendaftaran</a></li>
            <li><a href="#contact" class="nav-link">Kontak</a></li>
        </ul>
    </div>
</nav>

<!-- HERO -->
<section id="home" class="hero">
    <div class="hero-content">
        <h1>Formulir Pendaftaran Jepang</h1>
        <p>Isi data lengkap untuk keberangkatan Jepang</p>
        <a href="#pendaftaran" class="cta-button">Mulai Pendaftaran</a>
    </div>
</section>

<!-- FORM -->
<section id="pendaftaran" class="pendaftaran">
    <div class="container">
        <h2><i class="fas fa-file-alt"></i> Formulir Pendaftaran Lengkap</h2>

        <form id="jepangForm" class="jepang-form">

            <!-- DATA PRIBADI -->
            <div class="form-section">
                <h3><i class="fas fa-user"></i> Data Pribadi</h3>

                <div class="form-group">
                    <label>Nama lengkap *</label>
                    <input type="text" id="namaRomaji" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Jenis Kelamin *</label>
                        <select id="jenisKelamin" required>
                            <option value="">Pilih</option>
                            <option>Laki-laki</option>
                            <option>Perempuan</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Status Menikah</label>
                        <select id="statusMenikah">
                            <option value="">Pilih</option>
                            <option>Belum Menikah</option>
                            <option>Menikah</option>
                            <option>Cerai</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- ALAMAT -->
            <div class="form-section">
                <h3><i class="fas fa-map-marker-alt"></i> Alamat</h3>

                <div class="form-group">
                    <label>Tempat Lahir *</label>
                    <input type="text" id="tempatLahir" required>
                </div>

                <div class="form-group">
                    <label>Alamat Lengkap *</label>
                    <textarea id="alamatLengkap" rows="3" required></textarea>
                </div>
            </div>

            <!-- KELUARGA (FIX DUPLIKAT) -->
            <div class="form-section">
                <h3><i class="fas fa-users"></i> Data Keluarga</h3>

                <div id="keluargaContainer">

                    <div class="keluarga-item">
                        <h4>Ayah</h4>
                        <input type="hidden" name="keluargaHubungan[]" value="Ayah">
                        <input type="text" name="keluargaNama[]" placeholder="Nama">
                    </div>

                    <div class="keluarga-item">
                        <h4>Ibu</h4>
                        <input type="hidden" name="keluargaHubungan[]" value="Ibu">
                        <input type="text" name="keluargaNama[]" placeholder="Nama">
                    </div>

                    <div class="keluarga-item">
                        <h4>Kakak / Adik</h4>
                        <select name="keluargaHubungan[]">
                            <option>Kakak</option>
                            <option>Adik</option>
                        </select>
                        <input type="text" name="keluargaNama[]" placeholder="Nama">
                    </div>

                </div>

                <button type="button" id="tambahKeluarga" class="btn-add">
                    ➕ Tambah Keluarga
                </button>
            </div>

            <!-- FOTO -->
            <div class="form-section">
                <h3><i class="fas fa-camera"></i> Foto</h3>
                <input type="file" id="foto" accept="image/*" required>
                <div id="fotoPreview"></div>
            </div>

            <!-- BUTTON -->
            <div class="form-actions">
                <button type="submit" class="btn-submit">
                    Generate PDF
                </button>

                <button type="button" id="clearForm" class="btn-clear">
                    Reset
                </button>
            </div>

        </form>

        <div id="successMessage" style="display:none;">
            Berhasil!
        </div>

    </div>
</section>

<!-- SCRIPT HARUS DI PALING BAWAH -->
<script src="script.js"></script>

</body>
</html>
