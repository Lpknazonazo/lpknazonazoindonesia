<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Tekipaki Raya</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="nav-container">
        <div class="nav-logo">
            <i class="fas fa-graduation-cap"></i>
            Prime Tekipaki Raya
        </div>

        <ul class="nav-menu">
            <li><a href="#home" class="nav-link active">Home</a></li>
            <li><a href="#gallery" class="nav-link">Galeri</a></li>
            <li><a href="#pendaftaran" class="nav-link">Pendaftaran</a></li>
            <li><a href="#contact" class="nav-link">Kontak</a></li>
        </ul>
    </div>
</nav>

<!-- Hero -->
<section id="home" class="hero">
    <div class="hero-content">
        <h1>Selamat Datang di Prime Tekipaki Raya</h1>
        <p>Kembangkan skill Anda bersama kursus terbaik kami</p>
        <a href="#pendaftaran" class="cta-button">Daftar Sekarang</a>
    </div>
</section>

<!-- Pendaftaran -->
<section id="pendaftaran" class="pendaftaran">
    <div class="container">
        <h2>Pendaftaran Siswa Baru</h2>

        <form id="pendaftaranForm">

            <input type="text" id="nama" placeholder="Nama Lengkap" required><br><br>

            <input type="email" id="email" placeholder="Email" required><br><br>

            <input type="text" id="noHp" placeholder="No HP" required><br><br>

            <select id="jenisKursus" required>
                <option value="">Pilih Kursus</option>
                <option>Web Development</option>
                <option>Desain Grafis</option>
            </select><br><br>

            <select id="jadwal" required>
                <option value="">Pilih Jadwal</option>
                <option>Pagi</option>
                <option>Sore</option>
            </select><br><br>

            <textarea id="alamat" placeholder="Alamat"></textarea><br><br>

            <button type="submit" class="cta-button">
                Simpan & Download PDF
            </button>

        </form>

        <p id="successMessage" style="display:none; color:green;">
            ✅ Data berhasil di download
        </p>

    </div>
</section>

<!-- SCRIPT -->
<script>
document.getElementById("pendaftaranForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const nama = document.getElementById("nama").value;
    const email = document.getElementById("email").value;
    const noHp = document.getElementById("noHp").value;
    const kursus = document.getElementById("jenisKursus").value;
    const jadwal = document.getElementById("jadwal").value;
    const alamat = document.getElementById("alamat").value;

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    pdf.setFontSize(16);
    pdf.text("DATA PENDAFTARAN", 20, 20);

    pdf.setFontSize(12);
    pdf.text("Nama: " + nama, 20, 40);
    pdf.text("Email: " + email, 20, 50);
    pdf.text("No HP: " + noHp, 20, 60);
    pdf.text("Kursus: " + kursus, 20, 70);
    pdf.text("Jadwal: " + jadwal, 20, 80);
    pdf.text("Alamat: " + alamat, 20, 90);

    pdf.save("data-pendaftaran.pdf");

    document.getElementById("successMessage").style.display = "block";
});
</script>

</body>
</html>
